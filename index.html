<!DOCTYPE html>
<html>
<head>
<title>Free PDF Tools</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(to right,#000428,#004e92);
color:red;
}

/* Title */
h1{
text-align:center;
margin-top:40px;
font-size:40px;
color:#00c6ff;
}

/* Cards Container */
.tools{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
margin-top:50px;
}

/* Card Design */
.card{
background:rgba(255,255,255,0.05);
padding:30px;
width:220px;
border-radius:20px;
text-align:center;
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* Button */
.card button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:25px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
cursor:pointer;
}

/* Remove extra content issue */
.page{
max-width:1200px;
margin:auto;
}
</style>

</head>

<body>

<div class="page">

<h1>Free PDF Tools</h1>

<div class="tools">

<div class="card">
<h3>Merge PDF</h3>
<a href="merge.html"><button>Open Tool</button></a>
</div>

<div class="card">
<h3>Split PDF</h3>
<button>Open Tool</button>
</div>

<div class="card">
<h3>Compress PDF</h3>
<button>Open Tool</button>
</div>

</div>

</div>

</body>
</html>
