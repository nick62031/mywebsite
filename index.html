<!DOCTYPE html>
<html>
<head>

<title>Nikhil Website</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI;
}

body{
background:#0f0f0f;
color:white;
}

/* Navbar */

nav{
display:flex;
justify-content:space-between;
padding:20px 80px;
background:#111;
align-items:center;
}

nav h2{
color:white;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav li{
cursor:pointer;
color:#aaa;
}

nav li:hover{
color:white;
}

/* Hero */

.hero{
text-align:center;
padding:150px 20px;
}

.hero h1{
font-size:65px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
margin-top:20px;
font-size:22px;
color:#bbb;
}

.btn{
margin-top:35px;
padding:14px 40px;
border:none;
border-radius:30px;
font-size:17px;
cursor:pointer;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* Sections */

.section{
padding:100px 20px;
text-align:center;
}

.cards{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:35px;
margin-top:50px;
}

.card{
background:#1a1a1a;
padding:35px;
width:260px;
border-radius:15px;
transition:0.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card:hover{
transform:translateY(-10px);
}

/* Footer */

.footer{
padding:35px;
text-align:center;
background:#111;
color:#aaa;
}

</style>

</head>

<body>

<nav>

<h2>Nikhil</h2>

<ul>
<li>Home</li>
<li>About</li>
<li>Skills</li>
<li>Contact</li>
</ul>

</nav>

<div class="hero">

<h1>Build Amazing Websites</h1>

<p>Modern Web Developer</p>

<button class="btn" onclick="alert('Welcome to my website')">
Get Started
</button>

</div>

<div class="section">

<h2>About Me</h2>

<p>I create modern and fast websites.</p>

</div>

<div class="section">

<h2>My Skills</h2>

<div class="cards">

<div class="card">
<h3>HTML</h3>
<p>Website structure</p>
</div>

<div class="card">
<h3>CSS</h3>
<p>Design and layout</p>
</div>

<div class="card">
<h3>JavaScript</h3>
<p>Website interaction</p>
</div>

</div>

</div>

<div class="footer">

<p>© 2026 Nikhil Website</p>

</div>

</body>
</html>
